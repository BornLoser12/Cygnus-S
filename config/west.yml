manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: sayu-hub  # pmw3610-driver のフォーク
      url-base: https://github.com/sayu-hub
    - name: Dist16384   # あなたのフォーク
      url-base: https://github.com/Dist16384
    - name: cormoran
      url-base: https://github.com/cormoran
    - name: caksoylar  # <-- RGB LED
      url-base: https://github.com/caksoylar  

  projects:
    - name: zmk
      remote: cormoran
      revision: v0.3-branch+dya
      path: zmk
      import: app/west.yml
    - name: zmk-pmw3610-driver
      remote: Dist16384
      revision: main
      path: modules/zmk-pmw3610-driver
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: v0.3
    - name: zmk-module-runtime-input-processor
      remote: cormoran
      # Last pre-v4 revision, compatible with the v0.3-based firmware above.
      revision: dbf92f764de8b6ffd60bf5850514302875fe2570
      path: modules/zmk-module-runtime-input-processor

  self:
    path: config
